version: '3.9'

services:
  # ========================================
  # POSTGRESQL DATABASE
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: tecnica_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tecnica_db}
      POSTGRES_USER: ${DB_USER:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev_user} -d ${DB_NAME:-tecnica_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecnica_network

  # ========================================
  # BACKEND (NestJS)
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tecnica_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://dev_user:dev_password_123@postgres:5432/tecnica_db}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-/api}
      PASARELA_ENCRYPTION_KEY: ${PASARELA_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      QZ_PRIVATE_KEY: ${QZ_PRIVATE_KEY:-}
      QZ_CERTIFICATE: ${QZ_CERTIFICATE:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - tecnica_network
    restart: unless-stopped

  # ========================================
  # FRONTEND (Vue3 + Vite)
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tecnica_frontend
    ports:
      - "5173:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      API_INTERNAL_URL: http://tecnica_backend:3000/api
      VITE_APP_NAME: ${VITE_APP_NAME:-Prueba Técnica}
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - tecnica_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  tecnica_network:
    driver: bridge
